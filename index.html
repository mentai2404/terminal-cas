<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Super App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Используем системные переменные Telegram для идеального дизайна */
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #222222);
            --button-color: var(--tg-theme-button-color, #3390ec);
            --button-text: var(--tg-theme-button-text-color, #ffffff);
            --hint-color: var(--tg-theme-hint-color, #aaaaaa);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 80vh;
            overflow: hidden;
        }

        .user-card {
            background: rgba(128, 128, 128, 0.1);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 300px;
        }

        h1 { font-size: 24px; margin-bottom: 10px; }
        p { color: var(--hint-color); font-size: 14px; }

        .btn {
            background-color: var(--button-color);
            color: var(--button-text);
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
            transition: transform 0.1s;
        }

        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="user-card">
        <h1 id="user-name">Привет!</h1>
        <p>Добро пожаловать в моё мини-приложение.</p>
    </div>

    <button class="btn" onclick="sendData()">Отправить данные боту</button>
    <button class="btn" style="margin-top: 10px; background: #e53935;" onclick="triggerVibrate()">Вибрировать</button>

    <script>
        const tg = window.Telegram.WebApp;

        // Сообщаем Telegram, что приложение готово
        tg.ready();
        tg.expand(); // Разворачиваем на максимум

        // Выводим имя пользователя из Telegram
        const userName = document.getElementById('user-name');
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            userName.innerText = `Привет, ${tg.initDataUnsafe.user.first_name}!`;
        }

        // Функция: Вибрация (Haptic Feedback)
        function triggerVibrate() {
            tg.HapticFeedback.notificationOccurred('success');
        }

        // Функция: Отправка данных боту и закрытие
        function sendData() {
            const data = { message: "Пользователь нажал кнопку!" };
            tg.sendData(JSON.stringify(data)); 
            // После этой команды приложение закроется, а бот получит сообщение
        }

        // Настройка главной кнопки (MainButton) внизу экрана
        tg.MainButton.text = "ЗАКРЫТЬ ПРИЛОЖЕНИЕ";
        tg.MainButton.show();
        tg.MainButton.onClick(() => {
            tg.close();
        });
    </script>
</body>
</html>
