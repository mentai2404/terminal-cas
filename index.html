<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>INDLENDD CLUB</title>
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --sub-text: #888888;
            --card-bg: rgba(255, 255, 255, 0.04);
            --accent: #ffffff; /* Белый акцент для элитарности */
            --glass: rgba(255, 255, 255, 0.01);
            --blur: 25px;
            --transition-ui: cubic-bezier(0.23, 1, 0.32, 1); /* Дорогая кривая */
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: -apple-system, system-ui, BlinkMacSystemFont, sans-serif;
            overflow: hidden; height: 100vh;
            display: flex; flex-direction: column;
            padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);
        }

        /* --- Глобальная анимация затухания --- */
        .fade-out { opacity: 0; filter: blur(10px); }
        .transition-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 1000;
            transition: opacity 0.8s var(--transition-ui), visibility 0.8s;
            visibility: hidden; opacity: 0;
        }
        .transition-layer.active { visibility: visible; opacity: 1; }

        /* --- Header: Логотип и Автор --- */
        header {
            position: fixed; top: env(safe-area-inset-top); left: 0; width: 100%;
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px 25px; box-sizing: border-box; z-index: 500;
        }

        .logo {
            font-size: 16px; font-weight: 900; letter-spacing: 5px; text-transform: uppercase;
            color: var(--text); position: relative;
        }
        .logo::after {
            content: ''; position: absolute; bottom: -5px; left: 0; width: 20px; height: 1.5px;
            background: var(--accent);
        }

        .author {
            font-size: 10px; font-weight: 500; text-transform: uppercase;
            color: var(--sub-text); letter-spacing: 2px;
        }
        .author a { color: inherit; text-decoration: none; border-bottom: 0.5px solid var(--sub-text); }

        /* --- Main Content --- */
        main {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 0 25px;
        }

        /* --- Screen 1: Авторизация --- */
        #auth-screen {
            display: flex; flex-direction: column; align-items: center; text-align: center;
            transition: opacity 0.5s var(--transition-ui), filter 0.5s var(--transition-ui);
        }
        
        #auth-screen h1 { font-size: 34px; font-weight: 800; margin: 0 0 10px; letter-spacing: -1px; }
        #auth-screen p { color: var(--sub-text); font-size: 15px; margin-bottom: 30px; line-height: 1.4; }

        /* --- Screen 2: Главный Контент --- */
        #app-screen {
            display: none; width: 100%; max-width: 400px;
            opacity: 0; transform: translateY(20px);
            transition: opacity 0.6s var(--transition-ui) 0.3s, transform 0.6s var(--transition-ui) 0.3s;
        }
        #app-screen.active { display: block; opacity: 1; transform: translateY(0); }

        .advice-card {
            background: var(--card-bg); border-radius: 35px; padding: 40px;
            border: 0.5px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(var(--blur)); -webkit-backdrop-filter: blur(var(--blur));
            transition: transform 0.5s var(--transition-ui);
            min-height: 200px; display: flex; flex-direction: column; justify-content: center;
        }
        
        .advice-title {
            color: var(--accent); font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 3px; margin-bottom: 20px;
        }

        .advice-text {
            font-size: 20px; font-weight: 600; line-height: 1.5;
            color: var(--text); text-align: left;
        }

        /* --- Кнопки Навигации --- */
        .controls {
            display: flex; justify-content: center; gap: 15px; margin-top: 30px;
        }

        .btn-nav {
            display: flex; align-items: center; justify-content: center;
            width: 55px; height: 55px; border-radius: 50%;
            background: var(--card-bg); border: 0.5px solid rgba(255, 255, 255, 0.08);
            color: var(--accent); transition: background 0.3s, transform 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-nav:active { background: rgba(255,255,255,0.1); transform: scale(0.95); }
        .btn-navsvg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 1.5; }

    </style>
</head>
<body>

    <div class="transition-layer" id="transition-layer"></div>

    <header>
        <div class="logo">INDLENDD</div>
        <div class="author">Created @indlendd (<a href="https://t.me/indlendd" target="_blank">tg</a>)</div>
    </header>

    <main>
        <div id="auth-screen">
            <h1>PRIVATE INSIGHTS</h1>
            <p>Добро пожаловать в клуб. Система выполняет<br>приватную инициализацию...</p>
        </div>

        <div id="app-screen">
            <div class="advice-card" id="advice-card">
                <div class="advice-title" id="advice-title">Совет #1</div>
                <div class="advice-text" id="advice-text">Твой мозг — самый дорогой актив. Инвестируй в знания, которые приносят доллары, а не просто тенге.</div>
            </div>

            <div class="controls">
                <button class="btn-nav" id="prev-btn">
                    <svg class="btn-navsvg" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
                </button>
                <button class="btn-nav" id="next-btn">
                    <svg class="btn-navsvg" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
                </button>
            </div>
        </div>
    </main>

    <script>
        const advices = [
            "Твой мозг — самый дорогой актив. Инвестируй в знания, которые приносят доллары, а не просто тенге.",
            "Сложный процент — восьмое чудо света. Начни откладывать сегодня, даже если это 1000 тенге.",
            "Не инвестируй в то, чего не понимаешь. Твои знания — твоя лучшая страховка от потерь.",
            "Сначала заплати себе. Откладывай минимум 10% от любого дохода до того, как начнешь тратить.",
            "Решай проблемы людей. Чем большую проблему ты решаешь, тем больше тебе готовы платить.",
            "Матовая пленка на iPhone — это стиль. Но матовый блеск в твоих делах — это дисциплина.",
            "Твоё окружение — это твой будущий баланс на карте. Фильтруй общение.",
            "Никогда не бери кредиты на вещи, которые не приносят тебе доход."
        ];

        let currentAdviceIndex = 0;
        const authScreen = document.getElementById('auth-screen');
        const appScreen = document.getElementById('app-screen');
        const adviceTitle = document.getElementById('advice-title');
        const adviceText = document.getElementById('advice-text');
        const adviceCard = document.getElementById('advice-card');
        const layer = document.getElementById('transition-layer');

        // Имитация авторизации и переход к контенту
        window.addEventListener('load', () => {
            setTimeout(() => {
                // Плавное затухание экрана авторизации
                authScreen.style.opacity = '0';
                authScreen.style.filter = 'blur(10px)';
                
                // Активация перехода (симуляция загрузки)
                setTimeout(() => {
                    layer.classList.add('active');
                    
                    // Переключение экранов
                    setTimeout(() => {
                        authScreen.style.display = 'none';
                        appScreen.classList.add('active');
                        layer.classList.remove('active');
                    }, 800); // Время анимации слоя
                }, 500); // Время затухания текста

            }, 2000); // Задержка экрана "Авторизация" (2 секунды)
        });

        // Функция обновления совета с анимацией карточки
        function updateAdvice(newIndex) {
            currentAdviceIndex = newIndex;
            
            // Анимация ухода карточки
            adviceCard.style.transform = 'scale(0.95)';
            adviceCard.style.opacity = '0';

            setTimeout(() => {
                adviceTitle.innerText = `Совет #${currentAdviceIndex + 1}`;
                adviceText.innerText = advices[currentAdviceIndex];
                
                // Анимация появления карточки
                adviceCard.style.transform = 'scale(1)';
                adviceCard.style.opacity = '1';
            }, 300); // Время скрытия карточки
        }

        // Кнопка "Вперед"
        document.getElementById('next-btn').addEventListener('click', () => {
            let nextIndex = (currentAdviceIndex + 1) % advices.length;
            updateAdvice(nextIndex);
        });

        // Кнопка "Назад"
        document.getElementById('prev-btn').addEventListener('click', () => {
            let prevIndex = (currentAdviceIndex - 1 + advices.length) % advices.length;
            updateAdvice(prevIndex);
        });

    </script>
</body>
</html>
