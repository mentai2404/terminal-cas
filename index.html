<script>
    // Создание эффекта капель
    function createDrop() {
        const container = document.getElementById('drops-container');
        const drop = document.createElement('div');
        drop.className = 'drop';
        drop.style.left = Math.random() * 100 + 'vw';
        drop.style.height = Math.random() * 100 + 50 + 'px';
        drop.style.animationDuration = Math.random() * 2 + 1 + 's';
        drop.style.opacity = Math.random() * 0.3;
        container.appendChild(drop);
        setTimeout(() => drop.remove(), 3000);
    }
    setInterval(createDrop, 100);

    // Логика Интро и Терминала
    const wrapper = document.querySelector('.content-wrapper');
    const logDiv = document.getElementById('log');
    
    // Скрываем основной контент для интро
    wrapper.style.opacity = '0';
    wrapper.style.transition = 'opacity 2s ease';

    // Создаем элемент интро
    const introDiv = document.createElement('div');
    introDiv.style.cssText = 'position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); text-align:center; z-index:100; font-size:20px; letter-spacing:10px;';
    introDiv.innerHTML = '<div id="t1" style="opacity:0; transition:1s;">WELCOME TO FSOCIETY</div><br><div id="t2" style="opacity:0; transition:1s; color:#fff; font-weight:bold;">INDLENDD WORLD</div>';
    document.body.appendChild(introDiv);

    const logLines = [
        "> BOOTING SYSTEM_V3",
        "> DECRYPTING FSOCIETY PROTOCOLS",
        "> WIPE ALL TRACES... DONE",
        "> BYPASSING UAC... SUCCESS",
        "> ACCESS GRANTED: INDLENDD",
        "> CONNECTION_ESTABLISHED",
        "> READY."
    ];

    let i = 0;
    function showLog() {
        if(i < logLines.length) {
            const p = document.createElement('div');
            p.textContent = logLines[i];
            logDiv.appendChild(p);
            i++;
            setTimeout(showLog, 400);
        }
    }

    // Запуск последовательности
    setTimeout(() => document.getElementById('t1').style.opacity = '1', 500);
    setTimeout(() => document.getElementById('t2').style.opacity = '1', 1500);
    setTimeout(() => {
        introDiv.style.opacity = '0';
        setTimeout(() => {
            introDiv.remove();
            wrapper.style.opacity = '1';
            showLog();
        }, 1000);
    }, 4000);
</script>
