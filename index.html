<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL_ERROR</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');

        * { cursor: crosshair; }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier Prime', monospace;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Эффект помех на весь экран */
        body::before {
            content: " ";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
            z-index: 10;
        }

        /* Intro Screen */
        #intro {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
        }

        .intro-text {
            font-size: 1.5rem;
            letter-spacing: 12px;
            margin: 10px;
            opacity: 0;
            animation: glitchFade 4s forwards;
            text-transform: uppercase;
        }

        @keyframes glitchFade {
            0% { opacity: 0; filter: blur(20px); transform: skewX(20deg); }
            10% { opacity: 1; filter: blur(0); transform: skewX(0); }
            90% { opacity: 1; filter: blur(0); }
            100% { opacity: 0; filter: blur(10px); }
        }

        /* Main Section */
        .main-frame {
            opacity: 0;
            transition: opacity 1s;
            width: 85%;
            max-width: 800px;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }

        .side-panel {
            border-right: 1px solid #333;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .skull-ascii {
            font-size: 5px;
            line-height: 5px;
            white-space: pre;
            opacity: 0.7;
        }

        .terminal-output {
            font-size: 13px;
            height: 300px;
            overflow: hidden;
            line-height: 1.4;
            padding: 10px;
        }

        .links {
            margin-top: 20px;
            border-top: 1px solid #333;
            padding-top: 20px;
        }

        .links a {
            display: block;
            color: #888;
            text-decoration: none;
            margin: 5px 0;
            font-size: 12px;
            text-transform: uppercase;
        }

        .links a:hover {
            color: #fff;
            text-decoration: underline;
        }

        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            position: absolute;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>

<div id="intro">
    <div class="intro-text" style="animation-delay: 0.5s;">WELCOME TO FSOCIETY</div>
    <div class="intro-text" style="animation-delay: 1.8s;">INDLENDD WORLD</div>
</div>

<div class="main-frame" id="main">
    <div class="side-panel">
        <div class="skull-ascii">
        _______
     .-"       "-.
    /             \
   |               |
   |,  .-.   .-.  ,|
   | )(__/   \__)( |
   |/     /\     \|
   (_     ^^     _)
    \__|IIIIII|__/
     | \IIIIII/ |
     \          /
      `--------`
        </div>
        <div style="font-size: 9px; color: #444;">
            SYSTEM_STATUS: CORRUPTED<br>
            OVERRIDE_ENABLED: YES<br>
            NODE_TRACE: HIDDEN
        </div>
    </div>

    <div class="content-area">
        <div class="terminal-output" id="term"></div>
        <div class="links">
            <a href="https://instagram.com/moyra_atrooo" target="_blank">> [ EXT_LINK: INSTAGRAM ]</a>
            <a href="https://t.me/indlendd" target="_blank">> [ EXT_LINK: TELEGRAM ]</a>
        </div>
    </div>
</div>

<div class="scanline"></div>

<script>
    const intro = document.getElementById('intro');
    const main = document.getElementById('main');
    const term = document.getElementById('term');

    setTimeout(() => {
        intro.style.display = 'none';
        main.style.opacity = '1';
        startTerminal();
    }, 5000);

    const log = [
        "SYSTEM_BOOT: KERNEL_INIT...",
        "DECRYPTING RSA_KEYS... SUCCESS",
        "ESTABLISHING SECURE_TUNNEL...",
        "BYPASSING GLOBAL_FIREWALL...",
        "ACCESSING ENCRYPTED_STORAGE...",
        "PARSING DATA_STREAM...",
        "WARNING: UNKNOWN_ACCESS_POINT",
        "EXTRACTING CREDENTIALS...",
        "SESSION_ID: 0x9928AF1",
        "STAY_QUIET. WE_ARE_WATCHING.",
        "------------------------------",
        "> Я УЖЕ ЗНАЮ О ТЕБЕ МНОГОЕ."
    ];

    let i = 0;
    function startTerminal() {
        if (i < log.length) {
            let line = document.createElement('div');
            line.textContent = log[i];
            term.appendChild(line);
            i++;
            setTimeout(startTerminal, 300);
        }
    }
</script>

</body>
</html>
