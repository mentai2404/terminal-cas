<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSOCIETY | INDLENDD</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Экран приветствия */
        #intro {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
        }

        .intro-text {
            font-size: 2rem;
            letter-spacing: 5px;
            margin: 10px;
            opacity: 0;
            animation: fadeInOut 4s forwards;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: scale(0.9); filter: blur(10px); }
            20% { opacity: 1; transform: scale(1); filter: blur(0); }
            80% { opacity: 1; transform: scale(1); filter: blur(0); }
            100% { opacity: 0; transform: scale(1.1); filter: blur(10px); }
        }

        /* Основной контент */
        .main-content {
            opacity: 0;
            transition: opacity 2s ease-in;
            width: 90%;
            max-width: 700px;
            border: 1px solid #444;
            padding: 20px;
            background: rgba(5, 5, 5, 0.95);
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.2);
        }

        .skull {
            font-size: 7px;
            line-height: 7px;
            white-space: pre;
            text-align: center;
            color: #ff0000;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #ff0000;
        }

        .terminal-box {
            background: #000;
            padding: 15px;
            border: 1px solid #222;
            height: 200px;
            overflow-y: hidden;
            font-size: 14px;
            color: #0f0; /* Классический зеленый для контраста */
        }

        .links {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .links a {
            flex: 1;
            padding: 10px;
            border: 1px solid #fff;
            color: #fff;
            text-decoration: none;
            text-align: center;
            transition: 0.3s;
        }

        .links a:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 15px #fff;
        }

        .cursor { animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div id="intro">
    <div class="intro-text" style="animation-delay: 0.5s;">ДОБРО ПОЖАЛОВАТЬ В FSOCIETY</div>
    <div class="intro-text" style="animation-delay: 1.5s; color: red;">INDLENDD WORLD</div>
</div>

<div class="main-content" id="main">
    <div class="skull">
         ______
      .-"      "-.
     /            \
    |              |
    |,  .-.  .-.  ,|
    | )(__/  \__)( |
    |/     /\     \|
    (_     ^^     _)
     \__|IIIIII|__/
      | \IIIIII/ |
      \          /
       `--------`
    </div>

    <div class="terminal-box" id="term"></div>

    <div class="links">
        <a href="https://instagram.com/moyra_atrooo" target="_blank">INSTAGRAM</a>
        <a href="https://t.me/indlendd" target="_blank">TELEGRAM</a>
    </div>
</div>

<script>
    const intro = document.getElementById('intro');
    const main = document.getElementById('main');
    const term = document.getElementById('term');

    // Переключение с интро на сайт
    setTimeout(() => {
        intro.style.display = 'none';
        main.style.opacity = '1';
        typeTerminal();
    }, 4500);

    const lines = [
        "> CONNECTING TO LOCALHOST...",
        "> AUTHENTICATION SUCCESSFUL.",
        "> LOADING SYSTEM_CORE... DONE",
        "> EXEC_SCRIPT: HELLO_WORLD.SH",
        "> STATUS: AGGRESSIVE_MODE_ON",
        "> ПРИВЕТ, INDLENDD.",
        "> ВСЕ СИСТЕМЫ ПОД КОНТРОЛЕМ.",
        "> ОЖИДАНИЕ КОМАНДЫ..."
    ];

    let lineIdx = 0;
    function typeTerminal() {
        if (lineIdx < lines.length) {
            let p = document.createElement('div');
            p.textContent = lines[lineIdx];
            term.appendChild(p);
            lineIdx++;
            setTimeout(typeTerminal, 400);
        } else {
            term.innerHTML += '<span class="cursor">_</span>';
        }
    }
</script>

</body>
</html>
